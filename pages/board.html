<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <title>ESG 자료실 | BrightPath ESG Consulting</title>
  <meta name="keywords" content="ESG 자료실, ESG 자료, ESG 가이드 다운로드, ESG 참고자료">
  <meta name="description" content="BrightPath ESG Consulting 자료실 - ESG 경영, 에코바디스, RBA, 중대재해처벌법 관련 최신 소식과 자료를 제공합니다.">
  <link rel="canonical" href="https://brightpathesg.com/pages/board.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/board.css">
</head>
<body>

  <!-- Header / Navigation -->
  <div id="site-header"></div>

  <!-- Board Hero -->
  <section class="board-hero">
    <div class="container board-hero-content">
      <p class="section-label">Resources</p>
      <h1 class="section-title">ESG 자료실</h1>
      <p class="section-desc">ESG 경영, 에코바디스, RBA, 중대재해처벌법 관련 최신 소식과 자료를 제공합니다.</p>
    </div>
  </section>

  <!-- Board Content -->
  <section class="board-section">
    <div class="container" id="boardContent">

      <!-- Toolbar -->
      <div class="board-toolbar">
        <div class="board-total">
          <div class="board-total-icon">
            <svg viewBox="0 0 16 16"><rect x="2" y="3" width="12" height="2"/><rect x="2" y="7" width="12" height="2"/><rect x="2" y="11" width="12" height="2"/></svg>
          </div>
          <span>TOTAL. <strong id="boardTotalCount">0</strong></span>
        </div>
        <div class="board-search">
          <div class="board-filter">
            <select id="boardTypeFilter" aria-label="유형 필터">
              <option value="">유형 전체</option>
              <option value="news">소식</option>
              <option value="law">법규</option>
              <option value="cert">인증자료</option>
              <option value="insight">인사이트</option>
            </select>
          </div>
          <div class="board-filter">
            <select id="boardTopicFilter" aria-label="주제 필터">
              <option value="">주제 전체</option>
              <option value="esg">ESG</option>
              <option value="ecovadis">에코바디스</option>
              <option value="iso">ISO</option>
              <option value="safety">중대재해처벌법</option>
              <option value="rba">RBA</option>
            </select>
          </div>
          <input type="text" class="board-search-input" id="boardSearchInput" placeholder="검색어 입력">
          <button type="button" class="board-search-btn" id="boardSearchBtn">
            <svg viewBox="0 0 16 16"><circle cx="6.5" cy="6.5" r="5.5"/><path d="M11 11l4 4"/></svg>
            검색
          </button>
        </div>
      </div>

      <!-- Table -->
      <div class="board-table-wrap">
        <table class="board-table">
          <thead>
            <tr>
              <th class="col-no">No.</th>
              <th class="col-title">제목</th>
              <th class="col-author">작성자</th>
              <th class="col-date">등록일</th>
              <th class="col-views">조회수</th>
            </tr>
          </thead>
          <tbody id="boardBody">
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div class="board-pagination" id="boardPagination"></div>

    </div>
  </section>

  <!-- Footer -->
  <div id="site-footer"></div>

  <script src="../js/components.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/guide-og.js"></script>
  <script src="../js/guide-jsonld.js"></script>
  <script src="../js/board.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <title>상담 현황 게시판 | BrightPath ESG Consulting</title>
  <meta name="keywords" content="ESG 상담, ESG 컨설팅 상담, ESG 문의 현황, 컨설팅 상담 현황">
  <meta name="description" content="BrightPath ESG Consulting 상담 현황 - ESG 경영, 에코바디스, RBA, 중대재해처벌법 컨설팅 문의 현황.">
  <link rel="canonical" href="https://brightpathesg.com/pages/consult-board.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/board.css">
  <link rel="stylesheet" href="../css/consult-board.css">
</head>
<body>

  <!-- Header -->
  <div id="site-header"></div>

  <!-- Hero -->
  <section class="cb-hero">
    <div class="container cb-hero-content">
      <p class="section-label">Consulting Board</p>
      <h1 class="section-title">상담 현황</h1>
      <p class="section-desc">다양한 기업들이 ESG 경영, 에코바디스, RBA, 중대재해처벌법 컨설팅을 문의하고 있습니다.</p>
    </div>
  </section>

  <!-- Board -->
  <section class="cb-section">
    <div class="container" id="cbContent">

      <!-- Toolbar (자료실 동일 스타일) -->
      <div class="board-toolbar">
        <div class="board-total">
          <div class="board-total-icon">
            <svg viewBox="0 0 16 16"><rect x="2" y="3" width="12" height="2"/><rect x="2" y="7" width="12" height="2"/><rect x="2" y="11" width="12" height="2"/></svg>
          </div>
          <span>TOTAL. <strong id="cbTotalCount">0</strong></span>
        </div>
        <div class="board-search">
          <div class="board-filter">
            <select id="cbFilter" aria-label="카테고리 필터">
              <option value="">전체</option>
              <option value="esg">ESG</option>
              <option value="ecovadis">에코바디스</option>
              <option value="rba">RBA</option>
              <option value="safety">중대재해</option>
              <option value="iso">ISO</option>
            </select>
          </div>
          <input type="text" class="board-search-input" id="cbSearchInput" placeholder="검색어 입력">
          <button type="button" class="board-search-btn" id="cbSearchBtn">
            <svg viewBox="0 0 16 16"><circle cx="6.5" cy="6.5" r="5.5"/><path d="M11 11l4 4"/></svg>
            검색
          </button>
        </div>
      </div>

      <!-- Table -->
      <div class="board-table-wrap">
        <table class="board-table">
          <thead>
            <tr>
              <th class="col-no">No.</th>
              <th class="col-title">제목</th>
              <th class="col-author">작성자</th>
              <th class="col-date">등록일</th>
              <th class="col-views">조회수</th>
            </tr>
          </thead>
          <tbody id="cbBody"></tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div class="board-pagination" id="cbPagination"></div>

    </div>
  </section>

  <!-- Locked Modal -->
  <div class="cb-modal" id="cbModal">
    <div class="cb-modal-backdrop" id="cbModalBackdrop"></div>
    <div class="cb-modal-content">
      <button type="button" class="cb-modal-close" id="cbModalClose">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M5 5l10 10M15 5L5 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <div class="cb-modal-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none"><rect x="5" y="11" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M8 11V7a4 4 0 018 0v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="12" cy="16" r="1.5" fill="currentColor"/></svg>
      </div>
      <h3>비공개 상담 내역입니다</h3>
      <p>고객 정보 보호를 위해 비공개 처리된 상담입니다.<br>컨설팅 문의는 상담 신청을 이용해주세요.</p>
      <a href="index.html#contact" class="btn btn--primary btn--full">상담 신청하기</a>
    </div>
  </div>

  <!-- Footer -->
  <div id="site-footer"></div>

  <script src="../js/components.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/consult-board.js"></script>
  <script src="../js/guide-og.js"></script>
  <script src="../js/guide-jsonld.js"></script>
</body>
</html>
